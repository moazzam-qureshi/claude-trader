name: trading-sandwich

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  # pgbouncer and pgbouncer-exporter are gated behind the "pooled" profile.
  # App services bypass pgbouncer (PGBOUNCER_HOST=postgres in .env) until
  # we genuinely need pooling. Run with: docker compose --profile pooled up
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    profiles: ["pooled"]
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: postgres
      DB_PORT: 5432
      POOL_MODE: session
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres: {condition: service_healthy}
    ports:
      - "6432:6432"

  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:latest
    restart: unless-stopped
    profiles: ["pooled"]
    environment:
      PGBOUNCER_EXPORTER_HOST: 0.0.0.0
      PGBOUNCER_EXPORTER_PORT: 9127
      PGBOUNCER_CONNECTION_STRING: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/pgbouncer?sslmode=disable
    depends_on:
      - pgbouncer

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  ingestor:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./:/app
    command: ["python", "-m", "trading_sandwich.ingestor.main"]

  feature-worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    # Single replica for single-operator scale; 4-replica config was Phase 1
    # over-provisioning that pushed Docker Desktop on Windows over WSL2 memory
    # limits and wedged the daemon. Scale up later if real backpressure appears.
    deploy:
      replicas: 1
    volumes:
      - ./:/app
    command: ["celery", "-A", "trading_sandwich.celery_app", "worker",
              "-Q", "features", "-n", "features@%h", "--loglevel=info"]

  signal-worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./:/app
    command: ["celery", "-A", "trading_sandwich.celery_app", "worker",
              "-Q", "signals", "-n", "signals@%h", "--loglevel=info"]

  outcome-worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./:/app
    command: ["celery", "-A", "trading_sandwich.celery_app", "worker",
              "-Q", "outcomes", "-n", "outcomes@%h", "--loglevel=info"]

  mcp-server:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
    volumes:
      - ./:/app
    command: ["python", "-m", "trading_sandwich.mcp", "streamable-http"]
    expose:
      - "8765"

  triage-worker:
    build:
      context: .
      target: triage-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      mcp-server: {condition: service_started}
    volumes:
      - ./:/app
      - claude-oauth:/root/.claude
    environment:
      TS_WORKSPACE: /app
    command: ["celery", "-A", "trading_sandwich.celery_app", "worker",
              "-Q", "triage", "-n", "triage@%h", "--loglevel=info"]

  # Discord listener behind "discord" profile — needs DISCORD_BOT_TOKEN set.
  # Run with: docker compose --profile discord up
  discord-listener:
    build: .
    restart: unless-stopped
    profiles: ["discord"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./:/app
    command: ["python", "-m", "trading_sandwich.discord.listener"]

  execution-worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./:/app
    command: ["celery", "-A", "trading_sandwich.celery_app", "worker",
              "-Q", "execution", "-n", "execution@%h", "--loglevel=info"]

  celery-beat:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./:/app
    command: ["celery", "-A", "trading_sandwich.celery_app", "beat",
              "--scheduler=redbeat.RedBeatScheduler", "--loglevel=info"]

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  # Grafana behind "observability" profile — useful for dashboards but not
  # required for trading. Run with: docker compose --profile observability up
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  cli:
    build: .
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    profiles: ["oneshot"]
    entrypoint: ["myapp"]

  tools:
    build: .
    env_file: .env
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["oneshot"]
    entrypoint: []
    working_dir: /app
    environment:
      PYTHONPATH: /app/src

  test:
    build: .
    env_file: .env
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["oneshot"]
    entrypoint: ["pytest"]
    working_dir: /app
    environment:
      PYTHONPATH: /app/src
      TESTCONTAINERS_RYUK_DISABLED: "true"
      TESTCONTAINERS_HOST_OVERRIDE: "host.docker.internal"

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  claude-oauth:
