# Execution rails — dynamic position sizing (operator-set 2026-04-26)
# max_order_usd is now a HARD ceiling fallback. Real sizing is computed
# per-proposal by compute_position_size() using position_sizing.* below.
max_order_usd: 200              # absolute hard cap; formula caps at max_position_pct first
max_open_positions_per_symbol: 1
max_open_positions_total: 2     # was 3 — with 50%+ sizing, 2 max coexist
max_orders_per_day: 20
max_daily_realized_loss_usd: 35  # ~21% of $167; matches new dynamic sizing risk profile
max_leverage: 1                  # halal spot only — no margin, no borrowing (riba)
longs_only: true                 # halal spot only — no shorts (sale of unowned). Tier 1 inviolable.
max_account_drawdown_pct: 25     # was 10 — operator chose risk profile that allows 1-2
                                 # max-sized conviction losses without tripping kill-switch
max_correlated_usd: 200          # ~120% of $167 — single conviction trade can exhaust this
min_stop_distance_atr: 0.3
max_stop_distance_atr: 5.0
default_stop_atr_multiple: 1.5
default_rr_minimum: 1.5

# Claude invocation cap (unused Phase 1; Phase 2 enforces)
claude_daily_triage_cap: 500  # legacy cap from signal-triage era; heartbeat trader
                              # doesn't spawn Claude per signal, so this is just
                              # a label on the gating_outcome. Set high so signals
                              # don't get marked daily_cap_hit and falsely look gated
                              # when the heartbeat trader queries get_recent_signals.

# Global rate limit: minimum minutes between any two Claude triages
# regardless of archetype/symbol/timeframe. 30min = up to 48/day if
# every slot fires; in practice signals cluster so this caps a burst.
# Protects Claude Max session-quota from being drained by simultaneous
# archetype fires across symbols.
min_minutes_between_triages: 30

# Phase 2 execution posture
trading_enabled: true               # Phase 3 (2026-05-12): re-enabled for Task 2.30 — first
                                    # Wave 1 live deployment (grid-btc-1, $30, operator-approved).
                                    # The discretionary `propose_trade` path stays frozen behind
                                    # emergency_override=True (Task 2.29); this gate now only
                                    # un-blocks the mechanical-strategy intent rail.
execution_mode: live                # halal spot live (mainnet, ~$113 USDT 2026-05-11 after operator transfer-out) — Spec A.5 shipped 2026-04-26

# Proposal lifecycle
proposal_ttl_minutes: 15

# Live-mode safeguards
first_trade_size_multiplier: 0.5

# ----------------------------------------------------------------------
# Dynamic position sizing (operator-set 2026-04-26).
#
# At trade time, compute_position_size() computes:
#
#   raw_pct = base_pct
#             * min(win_rate / win_rate_anchor, win_rate_cap_mult)
#             * min(rr / rr_anchor, rr_cap_mult)
#             * min(sample_size / sample_anchor, sample_cap_mult)
#             * regime_multiplier
#
#   final_pct = clamp(raw_pct, min_position_pct, max_position_pct)
#
#   position_usd = equity_usd * final_pct
#                  * (first_trade_size_multiplier if no prior trades else 1.0)
#
# If raw_pct < min_position_pct, the trade is REFUSED (size below floor =
# not worth fees). Returned as size=0; caller proposes 'alert' instead of
# 'paper_trade'.
#
# The formula rewards: high win-rate, high RR, large sample, regime
# alignment. It penalizes (or refuses) the opposite. Claude does NOT
# self-rate conviction — sizing is derived from objective evidence.
position_sizing:
  base_pct: 0.40                  # baseline % of equity per trade
  min_position_pct: 0.05          # was 0.10 — lowered so sparse-sample setups
                                  # still size at floor (~$8 on $167) instead
                                  # of being refused. Trader is chart-first now;
                                  # DB sparseness is normal on a new account.
  max_position_pct: 0.80          # absolute ceiling for any trade
  min_position_usd: 11            # Binance min notional safety
  min_equity_to_size_usd: 30      # if equity < 30, refuse (catches auth bugs)
  # Conviction inputs:
  win_rate_anchor: 0.45           # win_rate / 0.45 -> multiplier (1.0 at anchor)
  win_rate_cap_mult: 1.4          # max multiplier from win_rate alone
  rr_anchor: 1.5                  # expected_rr / 1.5 -> multiplier
  rr_cap_mult: 1.4
  sample_anchor: 3                # was 15 — lowered to match new-account reality.
                                  # sample=3 hits anchor (full base size).
                                  # sample=1 still sizes (just smaller).
  sample_cap_mult: 1.2
  sample_mult_floor: 0.5          # NEW — sample multiplier never drops below this.
                                  # Means sample=0 still gets ~50% of base size
                                  # (chart-clean setups can be exploratory at floor).
                                  # Without this, sample=0 -> mult=0 -> refused
                                  # always, which kills new-account trading.
  # Regime gate (regime_multiplier applied last):
  #   1.0 = archetype + regime supportive
  #   0.5 = marginal pairing
  #   0.0 = anti-regime (always refuse)
  default_regime_multiplier: 1.0

# Reconciliation tolerances
reconciliation_block_tolerance:
  position_base_drift_pct: 0.5
  open_order_count_drift: 0

# Paper adapter
paper_starting_equity_usd: 10000

# Kill-switch behaviour
auto_flatten_on_kill: false

# ---------- Phase 2.7 — Heartbeat trader ----------

heartbeat:
  # Phase 3 (2026-05-12): the heartbeat now invokes the portfolio-strategist
  # persona (runtime/CLAUDE.md). Operator wants a FIXED 30-min review — not
  # Claude self-pacing — so min == max == 30. Whatever next_check_in_minutes
  # the strategist writes into STATE.md is clamped to 30 by the pacing fn.
  pacing_mode: fixed
  interval_minutes:
    min: 30
    max: 30
    default: 30
  defaults_by_state:
    no_open_positions_no_active_theses: 30
    active_theses_no_positions: 30
    open_positions_far_from_invalidation: 30
    open_positions_near_invalidation: 30
  daily_shift_cap: 60          # >= 48 (one every 30 min) with headroom
  weekly_shift_cap: 350        # >= 336 (48 * 7) with headroom
  shift_timeout_seconds: 300

# Phase 3 universe (spec §6.1, 2026-05-11) — full halal candidate set.
# Tier `watchlist` (Phase 2.7) renamed to `active`. Excluded sub-categorized
# by reason for exclusion (lending = riba, perp protocols = haram structure,
# memecoins = operator policy).
universe:
  tiers:
    core:
      symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
      size_multiplier: 1.0
      max_concurrent_positions: 4
      shift_attention: every_shift
    active:
      # Halal-clean L1s, L2s, DePIN, AI, currency. Strategies enabled.
      symbols: [
        # L1s
        AVAXUSDT, ADAUSDT, NEARUSDT, APTUSDT, SUIUSDT,
        ATOMUSDT, ALGOUSDT, DOTUSDT,
        # L2s / scaling
        ARBUSDT, OPUSDT, POLUSDT, IMXUSDT, STRKUSDT,
        # DePIN / infra
        LINKUSDT, FILUSDT, RNDRUSDT, GRTUSDT,
        # AI
        TAOUSDT, FETUSDT, WLDUSDT,
        # Currency
        LTCUSDT, BCHUSDT,
      ]
      size_multiplier: 0.5
      max_concurrent_positions: 12
      shift_attention: time_permitting
    observation:
      # Smaller liquidity / newer / monitored. No auto-trading; promotable.
      symbols: [HNTUSDT, AKTUSDT, AGIXUSDT, OCEANUSDT, DASHUSDT, ZECUSDT, INJUSDT]
      size_multiplier: 0.0
      max_concurrent_positions: 0
      shift_attention: weekly_sweep
    excluded:
      # Lending/yield protocols (riba)
      symbols_lending: [AAVEUSDT, COMPUSDT, MKRUSDT, LDOUSDT, CRVUSDT, CAKEUSDT]
      # Perpetual futures protocols (haram structure)
      symbols_perp_protocols: [GMXUSDT, DYDXUSDT, GNSUSDT]
      # Memecoins (operator policy — gambling/maysir + uncorrelated vol)
      symbols_memecoins: [SHIBUSDT, PEPEUSDT, BONKUSDT, WIFUSDT, FLOKIUSDT, DOGEUSDT]
      reason: "haram (riba on lending; perp structure on derivatives) or operator policy (memecoins)"
  hard_limits:
    min_24h_volume_usd_floor: 40000000
    vol_30d_annualized_max_ceiling: 3.00
    excluded_symbols_locked: [
      SHIBUSDT, PEPEUSDT, BONKUSDT, WIFUSDT, FLOKIUSDT, DOGEUSDT,
      AAVEUSDT, COMPUSDT, MKRUSDT, LDOUSDT, CRVUSDT, CAKEUSDT,
      GMXUSDT, DYDXUSDT, GNSUSDT,
    ]
    core_promotions_operator_only: true
    max_total_universe_size: 40       # core + active + observation
    max_per_tier:
      core: 5
      active: 25
      observation: 15

# ---------- Phase 3 — Regime classifier (spec §6.2) ----------

regime_classifier:
  primary_timeframe: "4h"
  hysteresis_required_consecutive: 2
  adx_trend_threshold: 25
  adx_range_threshold: 20
  atr_pct_volatile_threshold: 0.03
  atr_pct_quiet_threshold: 0.015
  manual_override_max_duration_hours: 168  # 1 week max

# ---------- Phase 3 — Strategy ↔ regime compatibility (spec §6.2) ----------
#
# Declarative map of which strategy types are eligible to run in which
# regimes. Loader: src/trading_sandwich/strategies/regime_compat.py.
# Wildcard "*" means compatible with every regime.
#
# Strategies are listed regardless of implementation status. Catalog
# (STRATEGY_CATALOG in regime_compat.py) is the source of truth for
# which IDs are valid; implementations land across Waves 1/2/3.

strategy_regime_compatibility:
  # Range capture (Category A)
  grid_standard: [RANGE_VOLATILE, RANGE_QUIET, TREND_UP]
  grid_infinity: [RANGE_VOLATILE, TREND_UP]
  grid_geometric: [RANGE_VOLATILE, RANGE_QUIET]
  grid_reverse: [RANGE_VOLATILE, RANGE_QUIET, TREND_UP]
  rsi_mean_reversion: [RANGE_VOLATILE]
  bollinger_reversion: [RANGE_VOLATILE, RANGE_QUIET]
  z_score_reversion: [RANGE_VOLATILE, RANGE_QUIET]
  range_expansion_contraction: [RANGE_VOLATILE, RANGE_QUIET]
  # Accumulation (Category B)
  dca_calendar: ["*"]
  dca_value_averaging: ["*"]
  dca_volatility_adj: ["*"]
  dca_indicator: [TREND_DOWN, RANGE_VOLATILE]
  dca_fear_greed: ["*"]
  dca_mvrv_nupl: ["*"]
  dca_drawdown_tier: ["*"]
  dca_pre_halving: ["*"]
  dca_capitulation: [TREND_DOWN]
  dca_profit_ladder: [TREND_UP]
  # Rebalancing (Category C)
  rebalance_periodic: ["*"]
  rebalance_threshold: ["*"]
  rebalance_risk_parity: ["*"]
  hodl_plus_plus: [RANGE_VOLATILE, RANGE_QUIET, TREND_UP]
  # Trend (Category D)
  trend_ma_crossover: [TREND_UP]
  trend_donchian: [TREND_UP, TREND_DOWN]
  trend_volatility_breakout: [RANGE_QUIET, TREND_UP]
  trend_time_series_momentum: [TREND_UP]
  trend_multi_tf_alignment: [TREND_UP]
  # Rotation (Category E)
  rotation_cross_sectional: [TREND_UP, RANGE_VOLATILE]
  rotation_sector: ["*"]
  rotation_btc_dominance: ["*"]
  rotation_pair: [RANGE_VOLATILE]
  rotation_index_tilt: ["*"]
  # Cycle (Category F)
  cycle_halving: ["*"]
  cycle_bottom_detection: [TREND_DOWN]
  cycle_top_detection: [TREND_UP]
  # Volatility regime (Category G)
  vol_targeting: ["*"]
  vol_anti_cyclical: ["*"]
