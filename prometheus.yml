global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: ingestor
    static_configs:
      - targets: ["ingestor:9100"]

  - job_name: feature-worker
    static_configs:
      - targets:
          - "feature-worker:9101"
          - "feature-worker:9102"
          - "feature-worker:9103"
          - "feature-worker:9104"
          - "feature-worker:9105"
          - "feature-worker:9106"
          - "feature-worker:9107"
          - "feature-worker:9108"

  - job_name: signal-worker
    static_configs:
      - targets: ["signal-worker:9121"]

  - job_name: outcome-worker
    static_configs:
      - targets: ["outcome-worker:9125"]

  - job_name: pgbouncer
    static_configs:
      - targets: ["pgbouncer-exporter:9127"]

  # Phase 2 workers. Triage + execution use _metrics_port allocator
  # ranges 9129–9132 and 9133–9136 respectively. mcp-server fixed
  # at 9100 (metrics endpoint to be wired alongside FastMCP in a
  # follow-up; scrape target registered now so infra is ready).
  - job_name: mcp-server
    static_configs:
      - targets: ["mcp-server:9100"]

  - job_name: triage-worker
    static_configs:
      - targets:
          - "triage-worker:9129"
          - "triage-worker:9130"
          - "triage-worker:9131"
          - "triage-worker:9132"

  - job_name: execution-worker
    static_configs:
      - targets:
          - "execution-worker:9133"
          - "execution-worker:9134"
          - "execution-worker:9135"
          - "execution-worker:9136"
