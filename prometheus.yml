global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: ingestor
    static_configs:
      - targets: ["ingestor:9100"]
  - job_name: feature-worker
    static_configs:
      - targets: ["feature-worker:9101"]
  - job_name: signal-worker
    static_configs:
      - targets: ["signal-worker:9102"]
  - job_name: outcome-worker
    static_configs:
      - targets: ["outcome-worker:9103"]
